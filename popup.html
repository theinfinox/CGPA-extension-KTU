<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>KTU CGPA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">

<style>
:root {
    /* Minimalist SaaS Color Palette */
    --bg-body: #F4F5F7;
    --bg-card: #FFFFFF;
    
    --text-main: #0F172A;
    --text-secondary: #64748B;
    --text-muted: #94A3B8;
    
    --border-light: #E2E8F0;
    --border-hover: #CBD5E1;
    
    --primary-btn: #0F172A;
    --primary-btn-hover: #334155;
    
    --secondary-btn: #FFFFFF;
    --secondary-btn-hover: #F8FAFC;

    /* Semantic Grade Colors (Soft background, dark text) */
    --grade-s-bg: #DCFCE7;  --grade-s-txt: #166534;
    --grade-ap-bg: #D1FAE5; --grade-ap-txt: #065F46;
    --grade-a-bg: #E0F2FE;  --grade-a-txt: #075985;
    --grade-bp-bg: #FEF3C7; --grade-bp-txt: #92400E;
    --grade-b-bg: #FFEDD5;  --grade-b-txt: #9A3412;
    --grade-c-bg: #F1F5F9;  --grade-c-txt: #334155;
    --grade-f-bg: #FEE2E2;  --grade-f-txt: #991B1B;

    --radius-lg: 16px;
    --radius-md: 10px;
    --radius-sm: 6px;
    
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
    --shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.03);
}

body {
    width: 620px;
    min-height: 600px;
    background: var(--bg-body);
    font-family: "Inter", sans-serif;
    color: var(--text-main);
    padding: 20px;
    margin: 0;
    scroll-behavior: smooth;
    -webkit-font-smoothing: antialiased;
}

/* Header Section */
.hero {
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-lg);
    padding: 18px;
    font-size: 20px;
    font-weight: 700;
    text-align: center;
    box-shadow: var(--shadow-sm);
    margin-bottom: 8px;
    letter-spacing: -0.02em;
}

.subtitle {
    text-align: center;
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 20px;
}

/* Info Banner */
.vibe-banner {
    background: #EFF6FF;
    border: 1px solid #BFDBFE;
    color: #1E3A8A;
    border-radius: var(--radius-md);
    padding: 14px 16px;
    font-size: 13px;
    line-height: 1.5;
    font-weight: 500;
    margin-bottom: 24px;
    box-shadow: var(--shadow-sm);
}

/* Buttons */
button {
    width: 100%;
    background: var(--secondary-btn);
    border: 1px solid var(--border-light);
    color: var(--text-main);
    border-radius: var(--radius-md);
    padding: 14px;
    font-size: 14px;
    font-weight: 600;
    font-family: "Inter", sans-serif;
    margin-bottom: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: var(--shadow-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

button:hover {
    background: var(--secondary-btn-hover);
    border-color: var(--border-hover);
}

button:active {
    transform: translateY(1px);
}

/* Make the primary download button stand out */
#download {
    background: var(--primary-btn);
    color: #FFFFFF;
    border: 1px solid var(--primary-btn);
}

#download:hover {
    background: var(--primary-btn-hover);
    border-color: var(--primary-btn-hover);
}

/* Stats Layout */
#stats {
    margin-bottom: 24px;
}

.stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
}

.stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-lg);
    padding: 20px 16px;
    text-align: center;
    box-shadow: var(--shadow-md);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.stat-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-hover);
}

.value {
    font-family: "JetBrains Mono", monospace;
    font-size: 28px;
    font-weight: 700;
    color: var(--text-main);
    letter-spacing: -0.04em;
}

.label {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 6px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}

/* Semesters */
#semesterContainer {
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin-top: 8px;
}

.semester-card {
    border: 1px solid var(--border-light);
    border-radius: var(--radius-lg);
    background: var(--bg-card);
    overflow: hidden;
    box-shadow: var(--shadow-md);
    transition: all 0.2s ease;
}

.semester-card:hover {
    box-shadow: var(--shadow-hover);
    border-color: var(--border-hover);
}

.semester-header {
    padding: 16px 20px;
    background: #F8FAFC;
    font-weight: 600;
    font-size: 16px;
    border-bottom: 1px solid var(--border-light);
    color: var(--text-main);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.semester-meta {
    display: flex;
    gap: 10px;
    padding: 12px 20px;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border-light);
}

.meta-pill {
    padding: 4px 10px;
    background: var(--bg-body);
    border: 1px solid var(--border-light);
    color: var(--text-secondary);
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-weight: 600;
    font-family: "JetBrains Mono", monospace;
}

.subjects {
    margin-top: 0;
}

.subject {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border-light);
    transition: background 0.15s ease;
}

.subject:last-child {
    border-bottom: none;
}

.subject:hover {
    background: #F8FAFC;
}

.subject-name {
    flex: 1;
    font-size: 14px;
    font-weight: 500;
    line-height: 1.4;
    color: var(--text-main);
    word-break: normal;
    overflow-wrap: break-word;
}

.subject-code {
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 4px;
    font-family: "JetBrains Mono", monospace;
}

/* Beautiful SaaS Grade Badges */
.grade-pill {
    min-width: 48px;
    text-align: center;
    padding: 6px 12px;
    border-radius: var(--radius-sm);
    font-weight: 700;
    font-size: 14px;
    font-family: "JetBrains Mono", monospace;
}

.grade-S { background: var(--grade-s-bg); color: var(--grade-s-txt); }
.grade-Aplus { background: var(--grade-ap-bg); color: var(--grade-ap-txt); }
.grade-A { background: var(--grade-a-bg); color: var(--grade-a-txt); }
.grade-Bplus { background: var(--grade-bp-bg); color: var(--grade-bp-txt); }
.grade-B { background: var(--grade-b-bg); color: var(--grade-b-txt); }
.grade-C { background: var(--grade-c-bg); color: var(--grade-c-txt); }
.grade-F { background: var(--grade-f-bg); color: var(--grade-f-txt); }

/* Table styling (if injected dynamically) */
table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #F8FAFC;
    border-bottom: 1px solid var(--border-light);
    padding: 10px 16px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    text-align: left;
    text-transform: uppercase;
}

td {
    border-bottom: 1px solid var(--border-light);
    background: var(--bg-card);
    padding: 12px 16px;
    font-size: 13px;
}

</style>

</head>
<body>

<div class="hero">
    🎓 KTU CGPA Calculator
</div>

<div class="subtitle">
</div>

<div id="stats"></div>

<div class="vibe-banner">
    Minimum and Maximum fields are intended for those who already have backlogs and are planning their comeback. For others, it's just fun stats! Ignore the "Minimum CGPA" if you don't have any backlogs.
</div>

<button id="download">
    📥 Download CSV
</button>

<button id="exportVectorPdf">
    📑 Academic PDF ( Recommended - Selectable Text )
</button>

<div id="semesterContainer"></div>

<button id="exportPdf" style="margin-top: 24px;">
    📄 Export PDF ( 100 MB+ - Not Recommended - HQ )
</button>

<script src="libs/dom-to-image-more.min.js"></script>
<script src="pdf_vector.js"></script>
<script src="constants.js"></script>
<script src="libs/html2canvas.min.js"></script>
<script src="libs/jspdf.umd.min.js"></script>
<script src="pdf_old_quality.js"></script>
<script src="popup.js"></script>

</body>
</html>
